version: 1.1.5

cache: true

registration:
  socialLogins: []
  allowedDomains: []

interface:
  privacyPolicy:
    externalUrl: ""
    openNewTab: false
  termsOfService:
    externalUrl: ""
    openNewTab: false

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "anthropic/claude-sonnet-4-5"
          - "google/gemini-2.0-flash-001"
          - "deepseek/deepseek-chat-v3-0324"
          - "openai/gpt-4o"
          - "meta-llama/llama-4-maverick"
        fetch: true
      titleConvo: true
      titleModel: "google/gemini-2.0-flash-001"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "OpenRouter"
